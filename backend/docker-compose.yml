services:
  postgres:
    image: postgres:16-alpine
    container_name: eventplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventplatform
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventplatform
    ports:
      - "5432:5432"
    volumes:
      - eventplatform_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventplatform -d eventplatform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eventplatform_pgdata:
